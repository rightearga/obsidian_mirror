<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改密码 - Obsidian Mirror</title>
    <link rel="stylesheet" href="/static/css/variables.css?v=20260131">
    <link rel="stylesheet" href="/static/css/login.css?v=20260131">
</head>
<body data-theme="light">
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1>🔑 修改密码</h1>
                <p>请输入旧密码和新密码</p>
            </div>
            
            <form id="change-password-form" class="login-form">
                <div class="form-group">
                    <label for="old_password">旧密码</label>
                    <input 
                        type="password" 
                        id="old_password" 
                        name="old_password" 
                        required 
                        autocomplete="current-password"
                        placeholder="请输入旧密码"
                    >
                </div>
                
                <div class="form-group">
                    <label for="new_password">新密码</label>
                    <input 
                        type="password" 
                        id="new_password" 
                        name="new_password" 
                        required 
                        autocomplete="new-password"
                        placeholder="请输入新密码（至少 6 个字符）"
                        minlength="6"
                    >
                </div>
                
                <div class="form-group">
                    <label for="confirm_password">确认新密码</label>
                    <input 
                        type="password" 
                        id="confirm_password" 
                        name="confirm_password" 
                        required 
                        autocomplete="new-password"
                        placeholder="请再次输入新密码"
                        minlength="6"
                    >
                </div>
                
                <div id="error-message" class="error-message" style="display: none;"></div>
                <div id="success-message" class="success-message" style="display: none;"></div>
                
                <button type="submit" class="login-button" id="change-button">
                    修改密码
                </button>
                
                <button type="button" class="secondary-button" id="back-button">
                    返回首页
                </button>
            </form>
            
            <div class="login-footer">
                <p id="version-info">Obsidian Mirror <span id="version-number">v1.1.0</span></p>
            </div>
        </div>
    </div>
    
    <script>
        const form = document.getElementById('change-password-form');
        const changeButton = document.getElementById('change-button');
        const backButton = document.getElementById('back-button');
        const errorMessage = document.getElementById('error-message');
        const successMessage = document.getElementById('success-message');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // 禁用按钮，防止重复提交
            changeButton.disabled = true;
            changeButton.textContent = '提交中...';
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
            
            const oldPassword = document.getElementById('old_password').value;
            const newPassword = document.getElementById('new_password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            
            // 前端验证
            if (newPassword !== confirmPassword) {
                errorMessage.textContent = '两次输入的新密码不一致';
                errorMessage.style.display = 'block';
                changeButton.disabled = false;
                changeButton.textContent = '修改密码';
                return;
            }
            
            if (newPassword.length < 6) {
                errorMessage.textContent = '新密码至少需要 6 个字符';
                errorMessage.style.display = 'block';
                changeButton.disabled = false;
                changeButton.textContent = '修改密码';
                return;
            }
            
            if (oldPassword === newPassword) {
                errorMessage.textContent = '新密码不能与旧密码相同';
                errorMessage.style.display = 'block';
                changeButton.disabled = false;
                changeButton.textContent = '修改密码';
                return;
            }
            
            try {
                const response = await fetch('/api/auth/change-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        old_password: oldPassword,
                        new_password: newPassword
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // 修改成功
                    successMessage.textContent = data.message || '密码修改成功！3 秒后返回首页...';
                    successMessage.style.display = 'block';
                    
                    // 清空输入框
                    form.reset();
                    
                    // 3 秒后跳转到首页
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 3000);
                } else {
                    // 显示错误信息
                    errorMessage.textContent = data.message || '修改密码失败';
                    errorMessage.style.display = 'block';
                    changeButton.disabled = false;
                    changeButton.textContent = '修改密码';
                }
            } catch (error) {
                console.error('修改密码错误:', error);
                errorMessage.textContent = '网络错误，请稍后重试';
                errorMessage.style.display = 'block';
                changeButton.disabled = false;
                changeButton.textContent = '修改密码';
            }
        });
        
        // 返回按钮
        backButton.addEventListener('click', () => {
            window.location.href = '/';
        });
    </script>
    
    <!-- 主题初始化脚本 -->
    <script>
        // 页面加载时读取并应用主题（与主应用同步）
        (function() {
            const savedTheme = localStorage.getItem('obsidian_mirror_theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.body.setAttribute('data-theme', savedTheme);
        })();
        
        // 动态加载版本号
        (async function() {
            try {
                const response = await fetch('/health');
                const data = await response.json();
                if (data.version) {
                    document.getElementById('version-number').textContent = 'v' + data.version;
                }
            } catch (error) {
                console.error('获取版本号失败:', error);
                // 保持默认的 v1.1.0
            }
        })();
    </script>
</body>
</html>
