{% extends "layout.html" %}

{% block content %}
<div class="diff-page">
  <!-- 顶部工具栏 -->
  <div class="diff-header">
    <div class="diff-title">
      <a href="/doc/{{ note_path }}">{{ note_title }}</a>
      <span class="diff-sep">—</span>
      <span>Diff</span>
      <code class="diff-hash">{{ commit.hash_short }}</code>
    </div>
    <div class="diff-meta">
      <span class="diff-author">{{ commit.author }}</span>
      <span class="diff-date">{{ commit.date|truncate(19) }}</span>
      <span class="diff-subject">{{ commit.subject }}</span>
    </div>
    <div class="diff-actions">
      <a href="/doc/{{ note_path }}/at/{{ commit.hash }}" class="btn-diff-action" data-no-preview>查看快照</a>
      <a href="/doc/{{ note_path }}/history" class="btn-diff-action" data-no-preview>历史列表</a>
      <a href="/doc/{{ note_path }}" class="btn-diff-action btn-primary">当前版本</a>
    </div>
  </div>

  <!-- Diff 内容 -->
  {% if diff_html.is_empty() %}
  <p class="diff-empty">该提交无内容变更（可能是元数据提交）。</p>
  {% else %}
  <div class="diff-content">
    {{ diff_html|safe }}
  </div>
  {% endif %}
</div>

<style>
.diff-page { padding: 20px 24px; }
.diff-header {
  padding: 12px 16px; margin-bottom: 16px;
  background: var(--bg-secondary, #1e1e2e);
  border: 1px solid var(--border-color, #313244); border-radius: 6px;
  display: flex; flex-direction: column; gap: 6px;
}
.diff-title { font-size: 1.05rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.diff-title a { text-decoration: none; color: var(--text-primary, #cdd6f4); }
.diff-sep { color: var(--text-muted, #6c7086); }
.diff-hash { font-family: monospace; background: var(--bg-primary, #181825); padding: 1px 6px; border-radius: 3px; font-size: 0.82rem; }
.diff-meta { font-size: 0.85rem; color: var(--text-muted, #6c7086); display: flex; gap: 12px; flex-wrap: wrap; }
.diff-subject { color: var(--text-primary, #cdd6f4); font-style: italic; }
.diff-actions { display: flex; gap: 6px; }
.btn-diff-action {
  padding: 3px 10px; border: 1px solid var(--border-color, #313244);
  border-radius: 4px; font-size: 0.82rem; text-decoration: none;
  color: var(--text-primary, #cdd6f4); background: var(--bg-primary, #181825);
}
.btn-diff-action:hover { background: var(--bg-hover, rgba(255,255,255,0.07)); }
.btn-diff-action.btn-primary { background: var(--accent-color, #6a5acd); border-color: var(--accent-color, #6a5acd); color: #fff; }
.diff-empty { color: var(--text-muted, #6c7086); font-style: italic; padding: 12px; }

/* diff 表格样式 */
.diff-content { overflow-x: auto; }
.diff-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; font-family: monospace; }
.diff-table td { padding: 1px 12px; white-space: pre; vertical-align: top; line-height: 1.5; }
.diff-marker { width: 18px; user-select: none; color: var(--text-muted, #6c7086); text-align: center; border-right: 1px solid var(--border-color, #313244); padding-right: 6px; }
.diff-add    { background: rgba(154, 203, 60, 0.12); }
.diff-add    .diff-marker { color: #9ece6a; }
.diff-del    { background: rgba(247, 118, 142, 0.12); }
.diff-del    .diff-marker { color: #f7768e; }
.diff-hunk   { background: var(--bg-secondary, #1e1e2e); }
.diff-hunk td { color: #7aa2f7; padding: 3px 12px; }
.diff-ctx    td { color: var(--text-primary, #cdd6f4); }
</style>
{% endblock %}
