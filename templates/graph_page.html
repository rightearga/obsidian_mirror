{% extends "layout.html" %}

{% block head %}
<style>
/* 图谱专页：主内容区撑满可用高度，移除内边距 */
.main-scroll-container { padding: 0 !important; height: 100%; overflow: hidden; }
.markdown-body { padding: 0 !important; height: 100%; display: flex; flex-direction: column; }

/* 工具栏 */
#graph-page-toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: var(--bg-secondary, #1e1e2e);
    border-bottom: 1px solid var(--border-color, #313244);
    flex-shrink: 0;
    flex-wrap: wrap;
}
#graph-page-toolbar .toolbar-group {
    display: flex;
    align-items: center;
    gap: 6px;
}
#graph-page-toolbar .toolbar-sep {
    width: 1px;
    height: 20px;
    background: var(--border-color, #313244);
    margin: 0 4px;
}
#graph-page-toolbar label { font-size: 13px; color: var(--text-muted, #6c7086); }
#graph-page-toolbar select,
#graph-page-toolbar input[type="text"] {
    font-size: 13px;
    padding: 3px 8px;
    border: 1px solid var(--border-color, #313244);
    border-radius: 4px;
    background: var(--bg-primary, #181825);
    color: var(--text-primary, #cdd6f4);
}
#graph-page-toolbar input[type="text"] { width: 180px; }
#graph-page-toolbar button {
    font-size: 13px;
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid var(--border-color, #313244);
    background: var(--bg-primary, #181825);
    color: var(--text-primary, #cdd6f4);
    cursor: pointer;
}
#graph-page-toolbar button.active,
#graph-page-toolbar button:hover {
    background: var(--accent-color, #6a5acd);
    border-color: var(--accent-color, #6a5acd);
    color: #fff;
}
#graph-page-toolbar input[type="checkbox"] { cursor: pointer; }

/* 图谱容器：填满剩余高度 */
#graph-page-container {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: var(--graph-bg, #13131f);
}
#graph-page-vis {
    width: 100%;
    height: 100%;
}
#graph-page-loading,
#graph-page-error {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: var(--text-muted, #6c7086);
    pointer-events: none;
}
#graph-page-error { color: #f38ba8; }

/* 节点数统计 */
#graph-page-stats {
    position: absolute;
    bottom: 8px;
    right: 12px;
    font-size: 12px;
    color: var(--text-muted, #6c7086);
    pointer-events: none;
}
</style>
{% endblock %}

{% block content %}
<!-- 全局知识图谱专页（v1.7.0）-->
<div id="graph-page-toolbar">
    <!-- 视图模式切换 -->
    <div class="toolbar-group">
        <button id="gp-mode-global" class="active" onclick="gpSetMode('global')">全局图谱</button>
        <button id="gp-mode-note" onclick="gpSetMode('note')">笔记子图</button>
    </div>

    <div class="toolbar-sep"></div>

    <!-- 笔记搜索（子图模式时使用，全局模式时置灰） -->
    <div class="toolbar-group" id="gp-note-group">
        <label for="gp-note-input">笔记：</label>
        <input type="text" id="gp-note-input" placeholder="输入笔记标题…"
               oninput="gpOnNoteInput()" onkeydown="if(event.key==='Enter') gpLoad()">
        <select id="gp-depth" onchange="gpLoad()">
            <option value="1">深度 1</option>
            <option value="2" selected>深度 2</option>
            <option value="3">深度 3</option>
        </select>
    </div>

    <div class="toolbar-sep"></div>

    <!-- 全局图谱选项 -->
    <div class="toolbar-group" id="gp-global-group">
        <label>
            <input type="checkbox" id="gp-hide-isolated" onchange="gpLoad()">
            隐藏孤立节点
        </label>
    </div>

    <div class="toolbar-sep"></div>

    <!-- 聚类着色 -->
    <div class="toolbar-group">
        <label>
            <input type="checkbox" id="gp-cluster-color" checked onchange="gpApplyCluster()">
            标签聚类着色
        </label>
    </div>

    <!-- 高亮搜索 -->
    <div class="toolbar-sep"></div>
    <div class="toolbar-group">
        <label for="gp-highlight">高亮：</label>
        <input type="text" id="gp-highlight" placeholder="节点名称…"
               oninput="gpHighlight()" style="width:140px">
    </div>

    <!-- 热力图模式（v1.8.4） -->
    <div class="toolbar-sep"></div>
    <div class="toolbar-group">
        <label>
            <input type="checkbox" id="gp-heatmap" onchange="gpApplyHeatmap()">
            热度着色
        </label>
    </div>

    <!-- 影响力模式（v1.9.0） -->
    <div class="toolbar-sep"></div>
    <div class="toolbar-group">
        <label>
            <input type="checkbox" id="gp-influence" onchange="gpApplyInfluence()">
            影响力模式
        </label>
    </div>

    <!-- 路径查找（v1.9.2） -->
    <div class="toolbar-sep"></div>
    <div class="toolbar-group">
        <button id="gp-path-toggle" class="active" onclick="gpTogglePathPanel()" title="查找两篇笔记之间的最短链接路径">
            路径查找
        </button>
    </div>
</div>

<!-- 路径查找面板（v1.9.2，初始隐藏） -->
<div id="gp-path-panel" style="display:none;padding:8px 12px;background:var(--bg-secondary,#1e1e2e);
    border-bottom:1px solid var(--border-color,#313244);display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
    <input type="text" id="gp-path-from" list="gp-note-datalist" placeholder="起点笔记…"
           style="width:160px;padding:4px 8px;border:1px solid var(--border-color,#313244);
                  border-radius:4px;background:var(--bg-primary,#181825);color:var(--text-primary,#cdd6f4);font-size:0.85rem;">
    <span style="color:var(--text-muted,#6c7086)">→</span>
    <input type="text" id="gp-path-to" list="gp-note-datalist" placeholder="终点笔记…"
           style="width:160px;padding:4px 8px;border:1px solid var(--border-color,#313244);
                  border-radius:4px;background:var(--bg-primary,#181825);color:var(--text-primary,#cdd6f4);font-size:0.85rem;">
    <button onclick="gpFindPath()"
            style="padding:4px 12px;background:var(--accent-color,#6a5acd);border:none;border-radius:4px;
                   color:#fff;cursor:pointer;font-size:0.85rem;">
        查找
    </button>
    <button onclick="gpClearPath()" title="清除路径高亮"
            style="padding:4px 8px;background:var(--bg-primary,#181825);border:1px solid var(--border-color,#313244);
                   border-radius:4px;color:var(--text-muted,#6c7086);cursor:pointer;font-size:0.85rem;">
        ×
    </button>
    <span id="gp-path-result" style="font-size:0.83rem;color:var(--text-muted,#6c7086)"></span>
</div>

<!-- 图谱画布 -->
<div id="graph-page-container">
    <div id="graph-page-vis"></div>
    <div id="graph-page-loading">加载中…</div>
    <div id="graph-page-error" style="display:none"></div>
    <div id="graph-page-stats"></div>
</div>

<!-- 笔记搜索建议下拉（复用全局补全数据） -->
<datalist id="gp-note-datalist"></datalist>

<script>
// ──────────────────────────────────────────────────────────────────────────────
// 全局知识图谱专页脚本（v1.7.0）
// ──────────────────────────────────────────────────────────────────────────────
let gpNetwork = null;       // Vis.js Network 实例
let gpRawNodes = [];        // 当前节点数组
let gpRawEdges = [];        // 当前边数组
let gpMode = 'global';      // 'global' | 'note'
let gpAllTitles = [];       // 全部笔记标题列表（用于自动补全）

// 标签颜色调色板（与 graph.js 一致）
const GP_PALETTE = [
    '#7aa2f7','#9ece6a','#ff9e64','#bb9af7',
    '#2ac3de','#e0af68','#f7768e','#73daca',
    '#41a6b5','#a9b1d6','#7dcfff','#b4f9f8',
];

// ──────────────────────────────────────────────────────────────────────────────
// 初始化
// ──────────────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
    // v1.9.4：检查 URL 中的 since/until 参数（来自时间线页面跳转）
    const _params = new URLSearchParams(location.search);
    const _since  = _params.get('since');  // "YYYY-MM-DD"
    const _until  = _params.get('until');  // "YYYY-MM-DD"
    if (_since || _until) {
        // 设置为全局模式，加载完成后按时间范围过滤
        gpMode = 'global';
        document.getElementById('gp-mode-global').classList.add('active');
        document.getElementById('gp-mode-note').classList.remove('active');
        // 显示时间范围提示
        const hint = document.createElement('div');
        hint.style.cssText = 'font-size:0.8rem;color:var(--text-muted,#6c7086);padding:4px 12px;background:var(--bg-secondary,#1e1e2e);border-bottom:1px solid var(--border-color,#313244);';
        hint.textContent = `🕐 时间过滤：${_since || '…'} 至 ${_until || '…'}（非范围内节点半透明）`;
        document.querySelector('.markdown-body')?.prepend(hint);
    }
    // 初始加载全局图谱
    gpLoad();
    // 预取标题列表用于自动补全
    gpFetchTitles();
    // URL 参数：?note=xxx&depth=2 直接打开笔记子图
    const params = new URLSearchParams(location.search);
    if (params.get('note')) {
        document.getElementById('gp-note-input').value = params.get('note');
        if (params.get('depth')) document.getElementById('gp-depth').value = params.get('depth');
        gpSetMode('note');
    }
});

// ──────────────────────────────────────────────────────────────────────────────
// 模式切换
// ──────────────────────────────────────────────────────────────────────────────
function gpSetMode(mode) {
    gpMode = mode;
    document.getElementById('gp-mode-global').classList.toggle('active', mode === 'global');
    document.getElementById('gp-mode-note').classList.toggle('active', mode === 'note');
    // 笔记子图控件仅在 note 模式下激活
    const noteGroup = document.getElementById('gp-note-group');
    const globalGroup = document.getElementById('gp-global-group');
    noteGroup.style.opacity = mode === 'note' ? '1' : '0.4';
    noteGroup.style.pointerEvents = mode === 'note' ? '' : 'none';
    globalGroup.style.opacity = mode === 'global' ? '1' : '0.4';
    globalGroup.style.pointerEvents = mode === 'global' ? '' : 'none';
    gpLoad();
}

// ──────────────────────────────────────────────────────────────────────────────
// 数据加载
// ──────────────────────────────────────────────────────────────────────────────
// v1.8.0：渐进式加载阈值（超过此节点数时启用两阶段加载）
const GP_PROGRESSIVE_THRESHOLD = 800;

async function gpLoad() {
    gpShowLoading();
    try {
        if (gpMode !== 'global') {
            const noteTitle = document.getElementById('gp-note-input').value.trim();
            if (!noteTitle) { gpHideLoading(); return; }
            const depth = document.getElementById('gp-depth').value;
            const resp = await fetch(`/api/graph?note=${encodeURIComponent(noteTitle)}&depth=${depth}`);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            gpRender(await resp.json());
            return;
        }

        const hide = document.getElementById('gp-hide-isolated').checked;
        if (hide) {
            // 用户主动隐藏孤立节点 → 单次加载
            const resp = await fetch('/api/graph/global?hide_isolated=true');
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            gpRender(await resp.json());
            return;
        }

        // v1.8.0 渐进式加载（与 graph.js 逻辑一致）
        const phase1 = await fetch('/api/graph/global?hide_isolated=true');
        if (!phase1.ok) throw new Error(`HTTP ${phase1.status}`);
        const phase1Data = await phase1.json();
        gpRender(phase1Data);

        if ((phase1Data.nodes?.length ?? 0) <= GP_PROGRESSIVE_THRESHOLD) {
            // 节点不多，立刻追加完整数据
            const full = await fetch('/api/graph/global?hide_isolated=false');
            if (!full.ok) return;
            const fullData = await full.json();
            if ((fullData.nodes?.length ?? 0) > (phase1Data.nodes?.length ?? 0)) gpRender(fullData);
            return;
        }

        // 节点数 > 阈值：延迟追加孤立节点
        setTimeout(async () => {
            try {
                const full = await fetch('/api/graph/global?hide_isolated=false');
                if (!full.ok) return;
                const fullData = await full.json();
                const isolated = (fullData.nodes || []).filter(n =>
                    !(phase1Data.nodes || []).some(e => e.id === n.id)
                );
                if (isolated.length === 0 || !gpNetwork) return;
                const newNodes = isolated.map(n => ({
                    id: n.id, label: n.label, title: n.label,
                    color: { background: '#6b7280', border: '#9ca3af' },
                    font: { color: '#cdd6f4', size: 12 }, shape: 'dot', size: 8,
                    _tags: n.tags || [],
                }));
                gpNetwork.body.data.nodes.add(newNodes);
                gpRawNodes = gpRawNodes.concat(newNodes);
                document.getElementById('graph-page-stats').textContent =
                    `${fullData.nodes.length} 个节点  ${fullData.edges.length} 条边`;
            } catch(_) {}
        }, 500);
    } catch(e) {
        gpShowError('加载失败: ' + e.message);
    }
}

async function gpFetchTitles() {
    try {
        const resp = await fetch('/api/titles');
        if (!resp.ok) return;
        const data = await resp.json();
        gpAllTitles = (data.note_items || []).map(n => n.title);
        // 填入 datalist
        const dl = document.getElementById('gp-note-datalist');
        dl.innerHTML = gpAllTitles.map(t => `<option value="${t.replace(/"/g,'&quot;')}">`).join('');
        document.getElementById('gp-note-input').setAttribute('list', 'gp-note-datalist');
    } catch(_) {}
}

// ──────────────────────────────────────────────────────────────────────────────
// 渲染
// ──────────────────────────────────────────────────────────────────────────────
function gpRender(data) {
    if (typeof vis === 'undefined') {
        gpShowError('可视化库 vis.js 未加载');
        return;
    }

    if (gpNetwork) { gpNetwork.destroy(); gpNetwork = null; }

    // 计算入度（用于节点大小）
    const inDegree = {};
    data.edges.forEach(e => { inDegree[e.to] = (inDegree[e.to] || 0) + 1; });

    // 是否开启聚类着色
    const clusterColor = document.getElementById('gp-cluster-color').checked;
    const tagColorMap = clusterColor ? gpBuildTagColorMap(data.nodes) : {};

    gpRawNodes = data.nodes.map(node => {
        const deg = inDegree[node.id] || 0;
        const sz = 10 + Math.min(deg * 3, 25);
        const color = clusterColor
            ? gpNodeColor(node, tagColorMap)
            : { background: '#6a5acd', border: '#8b7ae0' };
        return {
            id: node.id,
            label: node.label,
            title: node.label + (node.tags?.length ? '\n标签: ' + node.tags.join(', ') : ''),
            color,
            font: { color: '#cdd6f4', size: 13 },
            shape: 'dot',
            size:      sz,
            _tags:     node.tags     || [],
            _mtime:    node.mtime    || 0,       // v1.8.4：热力图使用
            _pagerank: node.pagerank || 0,        // v1.9.0：影响力模式使用
        };
    });

    gpRawEdges = data.edges.map(e => ({
        from:   e.from,
        to:     e.to,
        arrows: 'to',
        color:  { color: '#6b7280', highlight: '#7aa2f7' },
        // v1.9.0：边宽度映射边权重（双向互引更粗）
        width:  (e.weight || 1) === 2 ? 3.0 : 1.5,
        smooth: { type: 'continuous' },
    }));

    const container = document.getElementById('graph-page-vis');
    const graphData = {
        nodes: new vis.DataSet(gpRawNodes),
        edges: new vis.DataSet(gpRawEdges),
    };
    const options = {
        nodes: { borderWidth: 1.5, borderWidthSelected: 2.5, shadow: true },
        edges: { shadow: false },
        physics: {
            enabled: true,
            solver: 'forceAtlas2Based',
            forceAtlas2Based: {
                gravitationalConstant: -50,
                centralGravity: 0.005,
                springLength: 100,
                springConstant: 0.08,
            },
            stabilization: { iterations: 150, updateInterval: 25 },
        },
        interaction: { hover: true, tooltipDelay: 200, navigationButtons: false },
    };
    gpNetwork = new vis.Network(container, graphData, options);

    // 节点单击跳转
    gpNetwork.on('click', params => {
        if (params.nodes.length === 1) {
            const nodeId = params.nodes[0];
            // nodeId 是相对路径（如 "folder/note.md"）
            window.location.href = '/doc/' + nodeId;
        }
    });

    gpHideLoading();
    document.getElementById('graph-page-stats').textContent =
        `${data.nodes.length} 个节点  ${data.edges.length} 条边`;

    // v1.9.4：URL since/until 时间过滤（来自时间线页面跳转）
    const _sp    = new URLSearchParams(location.search);
    const _since = _sp.get('since');
    const _until = _sp.get('until');
    if ((_since || _until) && gpNetwork) {
        const sinceTs = _since ? new Date(_since).getTime() / 1000 : 0;
        const untilTs = _until ? new Date(_until + 'T23:59:59').getTime() / 1000 : Infinity;
        const dimmed = gpRawNodes
            .filter(n => n._mtime < sinceTs || n._mtime > untilTs)
            .map(n => ({ id: n.id, color: { background: '#2d2d3a', border: '#3a3a4a' }, opacity: 0.3 }));
        if (dimmed.length > 0) gpNetwork.body.data.nodes.update(dimmed);
    }
}

// ──────────────────────────────────────────────────────────────────────────────
// 聚类着色
// ──────────────────────────────────────────────────────────────────────────────
function gpBuildTagColorMap(nodes) {
    // 统计各标签出现次数，取出现最多的前 12 个
    const freq = {};
    nodes.forEach(n => (n.tags || []).forEach(t => { freq[t] = (freq[t] || 0) + 1; }));
    const sorted = Object.entries(freq).sort((a, b) => b[1] - a[1]).slice(0, 12);
    const map = {};
    sorted.forEach(([tag], i) => { map[tag] = GP_PALETTE[i % GP_PALETTE.length]; });
    return map;
}

function gpNodeColor(node, tagColorMap) {
    const tags = node.tags || [];
    // 找到节点最高频标签对应的颜色
    for (const tag of tags) {
        if (tagColorMap[tag]) {
            return { background: tagColorMap[tag], border: tagColorMap[tag] };
        }
    }
    return { background: '#6b7280', border: '#9ca3af' };
}

// ──────────────────────────────────────────────────────────────────────────────
// 聚类着色切换（不重新请求数据，直接更新颜色）
// ──────────────────────────────────────────────────────────────────────────────
function gpApplyCluster() {
    if (!gpNetwork) return;
    const clusterColor = document.getElementById('gp-cluster-color').checked;
    const tagColorMap = clusterColor ? gpBuildTagColorMap(gpRawNodes) : {};
    const updated = gpRawNodes.map(n => ({
        id: n.id,
        color: clusterColor
            ? gpNodeColor(n, tagColorMap)
            : { background: '#6a5acd', border: '#8b7ae0' },
    }));
    gpNetwork.body.data.nodes.update(updated);
}

// ──────────────────────────────────────────────────────────────────────────────
// v1.8.4：热力图模式（节点颜色 = 修改时间新旧，蓝→绿→黄→红）
// ──────────────────────────────────────────────────────────────────────────────

/** 根据 0.0–1.0 的热度值返回颜色（冷蓝 → 热红） */
function gpHeatColor(ratio) {
    const r = Math.round(ratio * 255);
    const b = Math.round((1 - ratio) * 255);
    return `rgb(${r},80,${b})`;
}

/** 热力图模式：节点颜色映射 mtime 相对新旧 */
function gpApplyHeatmap() {
    if (!gpNetwork) return;
    const enabled = document.getElementById('gp-heatmap').checked;

    if (enabled) {
        // 计算 mtime 的最小/最大值用于归一化
        const mtimes = gpRawNodes.map(n => n._mtime || 0).filter(m => m > 0);
        if (mtimes.length === 0) return;
        const minMtime = Math.min(...mtimes);
        const maxMtime = Math.max(...mtimes);
        const range = maxMtime - minMtime || 1;

        const updated = gpRawNodes.map(n => {
            const ratio = n._mtime > 0 ? (n._mtime - minMtime) / range : 0;
            const color = gpHeatColor(ratio);
            return { id: n.id, color: { background: color, border: color } };
        });
        gpNetwork.body.data.nodes.update(updated);
    } else {
        // 恢复正常着色
        gpApplyCluster();
    }
}

// ──────────────────────────────────────────────────────────────────────────────
// v1.9.0：影响力模式（节点尺寸 + 颜色 = PageRank 分数）
// ──────────────────────────────────────────────────────────────────────────────

/** 影响力模式：节点尺寸映射 pagerank 分数（10–40px），颜色深蓝→金色 */
function gpApplyInfluence() {
    if (!gpNetwork) return;
    const enabled = document.getElementById('gp-influence').checked;

    if (enabled) {
        // 获取最大 pagerank，防止全零（例如局部图谱）
        const maxPR = Math.max(...gpRawNodes.map(n => n._pagerank || 0), 0.001);

        const updated = gpRawNodes.map(n => {
            const ratio = (n._pagerank || 0) / maxPR;           // 0.0–1.0
            const size  = 10 + Math.round(ratio * 30);          // 10–40px
            // 颜色：低影响力=冷蓝 #4a5568，高影响力=金色 #f6ad55
            const r = Math.round(74  + ratio * (246 - 74));
            const g = Math.round(85  + ratio * (173 - 85));
            const b = Math.round(104 + ratio * (85  - 104));
            const color = `rgb(${r},${g},${b})`;
            // Tooltip 显示影响力分数和排名
            const scoreText = (n._pagerank * 100).toFixed(1);
            return {
                id:    n.id,
                size,
                color: { background: color, border: color },
                title: `${n.label}\n影响力分数：${scoreText}%`,
            };
        });
        gpNetwork.body.data.nodes.update(updated);
    } else {
        // 恢复正常着色（复用 gpApplyCluster）
        gpApplyCluster();
        // 恢复默认尺寸
        const restored = gpRawNodes.map(n => {
            const deg = (gpRawEdges.filter(e => e.to === n.id).length);
            return { id: n.id, size: 10 + Math.min(deg * 3, 25) };
        });
        gpNetwork.body.data.nodes.update(restored);
    }
}

// ──────────────────────────────────────────────────────────────────────────────
// v1.9.2：图谱路径查找
// ──────────────────────────────────────────────────────────────────────────────

let _gpPathActive = false; // 是否正在显示路径高亮

/** 切换路径查找面板显示/隐藏 */
function gpTogglePathPanel() {
    const panel = document.getElementById('gp-path-panel');
    if (!panel) return;
    const visible = panel.style.display !== 'none';
    panel.style.display = visible ? 'none' : 'flex';
    if (visible) gpClearPath(); // 关闭时清除高亮
}

/** 调用 /api/graph/path 并高亮路径 */
async function gpFindPath() {
    const from = document.getElementById('gp-path-from').value.trim();
    const to   = document.getElementById('gp-path-to').value.trim();
    const result = document.getElementById('gp-path-result');

    if (!from || !to) { result.textContent = '请填写起点和终点'; return; }
    if (!gpNetwork)    { result.textContent = '请先加载图谱'; return; }

    result.textContent = '查找中…';

    try {
        const resp = await fetch(`/api/graph/path?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}`);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();

        if (data.message) {
            result.textContent = data.message;
            gpClearPath();
            return;
        }

        const hops      = data.hops || 0;
        const pathIds   = new Set((data.nodes || []).map(n => n.id));
        const pathEdges = new Set((data.edges  || []).map(e => `${e.from}|${e.to}`));

        // 高亮路径节点（金色边框），半透明非路径节点
        const nodeUpdates = gpRawNodes.map(n => ({
            id:    n.id,
            color: pathIds.has(n.id)
                ? { background: '#f6ad55', border: '#ed8936', borderWidth: 3 }
                : { background: '#374151', border: '#4b5563', opacity: 0.3 },
            font:  { color: pathIds.has(n.id) ? '#1a202c' : '#6b7280' },
        }));
        gpNetwork.body.data.nodes.update(nodeUpdates);

        // 高亮路径边：通过 vis DataSet 查询所有边并更新
        const allEdges = gpNetwork.body.data.edges.get();
        const edgeUpdates = allEdges.map(e => ({
            id:    e.id,
            color: pathEdges.has(`${e.from}|${e.to}`)
                ? { color: '#f6ad55', highlight: '#ed8936' }
                : { color: 'rgba(107,114,128,0.2)' },
            width: pathEdges.has(`${e.from}|${e.to}`) ? 3 : 1,
        }));
        gpNetwork.body.data.edges.update(edgeUpdates);

        _gpPathActive = true;

        // 路径节点列表
        const nodeList = (data.nodes || [])
            .map(n => `<a href="/doc/${encodeURIComponent(n.id)}" style="color:#f6ad55;text-decoration:none">${esc(n.label)}</a>`)
            .join(' → ');
        result.innerHTML = `${hops} 跳：${nodeList}`;

    } catch(e) {
        result.textContent = '查找失败: ' + e.message;
    }
}

/** 清除路径高亮，恢复正常着色 */
function gpClearPath() {
    if (!gpNetwork || !_gpPathActive) return;
    _gpPathActive = false;
    document.getElementById('gp-path-result').textContent = '';
    // 恢复节点着色（复用 gpApplyCluster）
    gpApplyCluster();
    // 恢复边宽度（通过 vis DataSet 的实际 id）
    const allEdgesNow = gpNetwork.body.data.edges.get();
    const edgeRestore = allEdgesNow.map(e => ({
        id:    e.id,
        color: { color: '#6b7280', highlight: '#7aa2f7' },
        width: (e.width || 1.5), // 保留原始宽度
    }));
    gpNetwork.body.data.edges.update(edgeRestore);
}

// ──────────────────────────────────────────────────────────────────────────────
// 高亮节点
// ──────────────────────────────────────────────────────────────────────────────
function gpHighlight() {
    if (!gpNetwork) return;
    const q = document.getElementById('gp-highlight').value.trim().toLowerCase();
    if (!q) {
        // 清空高亮：恢复全部节点为正常颜色
        gpApplyCluster();
        gpNetwork.selectNodes([]);
        return;
    }
    const matched = gpRawNodes
        .filter(n => n.label.toLowerCase().includes(q))
        .map(n => n.id);
    gpNetwork.selectNodes(matched);
    if (matched.length > 0) gpNetwork.focus(matched[0], { scale: 1.2, animation: true });
}

// ──────────────────────────────────────────────────────────────────────────────
// 笔记输入事件
// ──────────────────────────────────────────────────────────────────────────────
let gpNoteDebounce = null;
function gpOnNoteInput() {
    clearTimeout(gpNoteDebounce);
    gpNoteDebounce = setTimeout(() => { if (gpMode === 'note') gpLoad(); }, 500);
}

// ──────────────────────────────────────────────────────────────────────────────
// UI 辅助
// ──────────────────────────────────────────────────────────────────────────────
function gpShowLoading() {
    document.getElementById('graph-page-loading').style.display = 'flex';
    document.getElementById('graph-page-error').style.display = 'none';
}
function gpHideLoading() {
    document.getElementById('graph-page-loading').style.display = 'none';
}
function gpShowError(msg) {
    document.getElementById('graph-page-loading').style.display = 'none';
    const el = document.getElementById('graph-page-error');
    el.textContent = msg;
    el.style.display = 'flex';
}
</script>
