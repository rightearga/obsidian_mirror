{% extends "layout.html" %}

{% block head %}
<style>
/* 时间线页面（v1.8.4）*/
.timeline-page { padding: 24px 32px; max-width: 900px; }
.timeline-toolbar {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    margin-bottom: 20px;
}
.timeline-toolbar input[type="text"],
.timeline-toolbar select {
    padding: 5px 10px; border: 1px solid var(--border-color, #313244);
    border-radius: 5px; background: var(--bg-secondary, #1e1e2e);
    color: var(--text-primary, #cdd6f4); font-size: 0.88rem;
}
.timeline-toolbar input[type="text"] { width: 180px; }
.tl-summary { font-size: 0.82rem; color: var(--text-muted, #6c7086); }
/* 年份分组标题 */
.tl-year { font-size: 1.1rem; font-weight: 700; color: var(--accent-color, #6a5acd);
    margin: 24px 0 8px; border-bottom: 2px solid var(--accent-color, #6a5acd);
    padding-bottom: 4px; cursor: pointer; user-select: none; }
/* 月份分组标题 */
.tl-month { font-size: 0.92rem; font-weight: 600; color: var(--text-muted, #6c7086);
    margin: 14px 0 4px 16px; cursor: pointer; user-select: none; }
.tl-month::before { content: "▾ "; font-size: 0.7rem; }
.tl-month.collapsed::before { content: "▶ "; }
/* 笔记卡片列表 */
.tl-notes { margin-left: 32px; }
.tl-notes.hidden { display: none; }
.tl-note {
    display: flex; align-items: baseline; gap: 10px; padding: 5px 8px;
    border-radius: 4px; text-decoration: none;
    color: var(--text-primary, #cdd6f4); font-size: 0.9rem;
    transition: background 0.1s;
}
.tl-note:hover { background: var(--bg-hover, rgba(255,255,255,0.06)); }
.tl-note-date { font-size: 0.78rem; color: var(--text-muted, #6c7086);
    white-space: nowrap; min-width: 80px; }
.tl-note-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tl-note-tags { display: flex; gap: 4px; flex-shrink: 0; }
.tl-tag { font-size: 0.72rem; padding: 1px 5px; border-radius: 3px;
    background: rgba(106,90,205,0.18); color: var(--accent-color, #bb9af7); }
#tl-loading { color: var(--text-muted, #6c7086); padding: 40px; text-align: center; }
#tl-empty   { color: var(--text-muted, #6c7086); font-style: italic; padding: 20px; }
/* v1.9.4 图谱跳转按钮 */
.tl-graph-btn {
    font-size: 0.72rem; padding: 1px 6px; border-radius: 3px;
    border: 1px solid var(--border-color, #313244);
    background: var(--bg-primary, #181825); color: var(--text-muted, #6c7086);
    text-decoration: none; margin-left: 6px; cursor: pointer; white-space: nowrap;
    vertical-align: middle;
}
.tl-graph-btn:hover { background: var(--accent-color, #6a5acd); color: #fff; border-color: var(--accent-color, #6a5acd); }
/* v1.9.4 图表区 */
.tl-chart-section { margin-bottom: 24px; }
.tl-chart-section h3 { font-size: 0.9rem; color: var(--text-muted, #6c7086); margin: 0 0 8px; }
</style>
{% endblock %}

{% block content %}
<div class="timeline-page">
    <!-- 工具栏 -->
    <div class="timeline-toolbar">
        <input type="text" id="tl-filter-title" placeholder="按标题过滤…" oninput="tlRender()">
        <select id="tl-filter-tag" onchange="tlRender()">
            <option value="">全部标签</option>
        </select>
        <select id="tl-group-by" onchange="tlRender()">
            <option value="month">按月分组</option>
            <option value="year">按年分组</option>
        </select>
        <span class="tl-summary" id="tl-summary"></span>
    </div>

    <!-- v1.9.4：写作速度折线图 -->
    <div class="tl-chart-section" id="tl-speed-section" style="display:none">
        <h3>写作速度（笔记数 vs 字符数 / 月）</h3>
        <svg id="tl-speed-chart" height="110" viewBox="0 0 500 110" preserveAspectRatio="none" style="width:100%;overflow:visible;"></svg>
    </div>

    <!-- v1.9.4：标签演化 -->
    <div class="tl-chart-section" id="tl-tags-section" style="display:none">
        <h3>标签演化（Top 8 标签，按月堆叠）</h3>
        <svg id="tl-tags-chart" height="100" viewBox="0 0 500 100" preserveAspectRatio="none" style="width:100%;overflow:visible;"></svg>
        <div id="tl-tags-legend" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;font-size:0.78rem;"></div>
    </div>

    <div id="tl-loading">加载中…</div>
    <div id="tl-empty" style="display:none">没有符合条件的笔记</div>
    <div id="tl-content"></div>
</div>

<script>
// ── 时间线视图脚本（v1.8.4）──────────────────────────────────────────────────
let _tlAllNotes = [];
let _tlCollapsed = new Set();   // 折叠的 year-month 键

// v1.9.4：图表颜色调色板
const TL_PALETTE = ['#7aa2f7','#9ece6a','#f7768e','#e0af68','#bb9af7','#2ac3de','#ff9e64','#73daca'];

document.addEventListener('DOMContentLoaded', async () => {
    try {
        // 并行获取时间线数据和洞察数据
        const [rTimeline, rInsights] = await Promise.all([
            fetch('/api/timeline'),
            fetch('/api/insights/stats'),
        ]);
        if (!rTimeline.ok) throw new Error('HTTP ' + rTimeline.status);
        _tlAllNotes = await rTimeline.json();

        // v1.9.4：渲染写作速度图和标签演化图
        if (rInsights.ok) {
            const stats = await rInsights.json();
            if (stats.monthly_counts?.length && stats.monthly_char_counts?.length) {
                document.getElementById('tl-speed-section').style.display = '';
                tlRenderSpeed(stats.monthly_counts, stats.monthly_char_counts);
            }
        }
        tlRenderTagEvolution(_tlAllNotes);

        // 填充标签下拉
        const tags = new Set();
        _tlAllNotes.forEach(n => (n.tags || []).forEach(t => tags.add(t)));
        const sel = document.getElementById('tl-filter-tag');
        [...tags].sort().forEach(t => {
            const opt = document.createElement('option');
            opt.value = t; opt.textContent = '#' + t;
            sel.appendChild(opt);
        });

        document.getElementById('tl-loading').style.display = 'none';
        tlRender();
    } catch(e) {
        document.getElementById('tl-loading').textContent = '加载失败: ' + e.message;
    }
});

function tlRender() {
    const filterTitle = document.getElementById('tl-filter-title').value.toLowerCase().trim();
    const filterTag   = document.getElementById('tl-filter-tag').value;
    const groupBy     = document.getElementById('tl-group-by').value;

    // 过滤
    let filtered = _tlAllNotes.filter(n => {
        if (filterTitle && !n.title.toLowerCase().includes(filterTitle)) return false;
        if (filterTag && !(n.tags || []).includes(filterTag)) return false;
        return true;
    });

    const summary = document.getElementById('tl-summary');
    summary.textContent = `共 ${filtered.length} / ${_tlAllNotes.length} 篇`;

    const empty = document.getElementById('tl-empty');
    const content = document.getElementById('tl-content');
    empty.style.display = filtered.length === 0 ? '' : 'none';
    if (filtered.length === 0) { content.innerHTML = ''; return; }

    // 分组
    const groups = new Map();
    filtered.forEach(n => {
        const key = groupBy === 'year' ? n.date.slice(0, 4) : n.date.slice(0, 7);
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(n);
    });

    // 渲染
    let html = '';
    let lastYear = '';
    for (const [key, notes] of groups) {
        const year = key.slice(0, 4);
        if (groupBy === 'month') {
            if (year !== lastYear) {
                html += `<div class="tl-year" onclick="tlToggleYear('${year}')">${year} 年</div>`;
                lastYear = year;
            }
            const collapsed = _tlCollapsed.has('m-' + key) ? 'collapsed' : '';
            const hidden    = _tlCollapsed.has('m-' + key) ? 'hidden'    : '';
            const monthName = key.slice(5) + ' 月';
            // v1.9.4：月份旁加"图谱"跳转按钮
            const since = key + '-01';
            const until = key + '-31';
            const graphBtn = `<a href="/graph?since=${since}&amp;until=${until}" class="tl-graph-btn" title="查看该月图谱" onclick="event.stopPropagation()">图谱</a>`;
            html += `<div class="tl-month ${collapsed}" id="th-m-${key}" onclick="tlToggle('m-${key}')">${key.slice(0,4)}年${monthName}（${notes.length} 篇）${graphBtn}</div>`;
            html += `<div class="tl-notes ${hidden}" id="tn-m-${key}">`;
        } else {
            const collapsed = _tlCollapsed.has('y-' + key) ? 'collapsed' : '';
            const hidden    = _tlCollapsed.has('y-' + key) ? 'hidden'    : '';
            html += `<div class="tl-year ${collapsed}" id="th-y-${key}" onclick="tlToggle('y-${key}')">${key} 年（${notes.length} 篇）</div>`;
            html += `<div class="tl-notes ${hidden}" id="tn-y-${key}">`;
        }

        notes.forEach(n => {
            const tags = (n.tags || []).slice(0, 3).map(t =>
                `<span class="tl-tag">#${esc(t)}</span>`).join('');
            html += `<a href="/doc/${encodeURIComponent(n.path)}" class="tl-note" data-no-preview>
                <span class="tl-note-date">${esc(n.date)}</span>
                <span class="tl-note-title">${esc(n.title)}</span>
                <span class="tl-note-tags">${tags}</span>
            </a>`;
        });
        html += '</div>';
    }

    content.innerHTML = html;
}

function tlToggle(key) {
    const type = key.startsWith('m-') ? 'm-' : 'y-';
    const id   = key.slice(type.length);
    if (_tlCollapsed.has(key)) {
        _tlCollapsed.delete(key);
    } else {
        _tlCollapsed.add(key);
    }
    const hdr  = document.getElementById('th-' + key);
    const body = document.getElementById('tn-' + key);
    if (hdr)  hdr.classList.toggle('collapsed', _tlCollapsed.has(key));
    if (body) body.classList.toggle('hidden',    _tlCollapsed.has(key));
}

function tlToggleYear(year) {
    // 按年折叠时，折叠/展开该年下所有月份
    const allKeys = [..._tlCollapsed];
}

function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── v1.9.4：写作速度双折线图 ─────────────────────────────────────────────────
function tlRenderSpeed(monthlyCounts, monthlyChars) {
    const svg = document.getElementById('tl-speed-chart');
    const W = 500, H = 110, PAD = { t:8, r:40, b:25, l:35 };
    const n  = Math.min(monthlyCounts.length, monthlyChars.length);
    if (n < 2) return;

    const counts = monthlyCounts.slice(-n).map(m => m.count);
    const chars  = monthlyChars.slice(-n).map(m => m.char_count);
    const maxC   = Math.max(...counts, 1);
    const maxCh  = Math.max(...chars,  1);
    const xStep  = (W - PAD.l - PAD.r) / Math.max(n - 1, 1);
    const yC  = v => PAD.t + (H - PAD.t - PAD.b) * (1 - v / maxC);
    const yCh = v => PAD.t + (H - PAD.t - PAD.b) * (1 - v / maxCh);

    let s = `<line x1="${PAD.l}" y1="${PAD.t}" x2="${PAD.l}" y2="${H-PAD.b}" stroke="var(--border-color,#313244)" stroke-width="1"/>`;
    s    += `<line x1="${PAD.l}" y1="${H-PAD.b}" x2="${W-PAD.r}" y2="${H-PAD.b}" stroke="var(--border-color,#313244)" stroke-width="1"/>`;

    const ptsC  = monthlyCounts.slice(-n).map((m, i) => `${PAD.l + i*xStep},${yC(m.count)}`).join(' ');
    const ptsCh = monthlyChars.slice(-n).map((m, i)  => `${PAD.l + i*xStep},${yCh(m.char_count)}`).join(' ');
    s += `<polyline points="${ptsC}"  fill="none" stroke="#7aa2f7" stroke-width="2" stroke-linejoin="round"/>`;
    s += `<polyline points="${ptsCh}" fill="none" stroke="#9ece6a" stroke-width="2" stroke-linejoin="round" stroke-dasharray="4 2"/>`;

    // X 轴标签（每 6 个月）
    monthlyCounts.slice(-n).forEach((m, i) => {
        if (i % 6 === 0 || i === n - 1) {
            s += `<text x="${PAD.l + i*xStep}" y="${H-6}" font-size="9" fill="var(--text-muted,#6c7086)" text-anchor="middle">${esc(m.year_month)}</text>`;
        }
    });
    // 图例
    s += `<rect x="${W-PAD.r+4}" y="${PAD.t}" width="8" height="8" fill="#7aa2f7"/><text x="${W-PAD.r+14}" y="${PAD.t+7}" font-size="9" fill="var(--text-muted,#6c7086)">笔记数</text>`;
    s += `<line x1="${W-PAD.r+4}" y1="${PAD.t+20}" x2="${W-PAD.r+12}" y2="${PAD.t+20}" stroke="#9ece6a" stroke-width="2" stroke-dasharray="4 2"/><text x="${W-PAD.r+14}" y="${PAD.t+23}" font-size="9" fill="var(--text-muted,#6c7086)">字符数</text>`;

    svg.innerHTML = s;
}

// ── v1.9.4：标签演化堆叠面积图 ──────────────────────────────────────────────
function tlRenderTagEvolution(notes) {
    if (!notes || notes.length === 0) return;

    const MAX_TAGS = 8;
    // 统计全局 Tag 频率，取 Top MAX_TAGS
    const tagFreq = {};
    notes.forEach(n => (n.tags || []).forEach(t => { tagFreq[t] = (tagFreq[t] || 0) + 1; }));
    const topTags = Object.entries(tagFreq).sort((a,b)=>b[1]-a[1]).slice(0, MAX_TAGS).map(([t])=>t);
    if (topTags.length < 2) return;

    // 按月分组
    const monthMap = {};
    notes.forEach(n => {
        const m = (n.date || n.mtime ? new Date((n.mtime || 0)*1000).toISOString().slice(0,7) : null);
        if (!m) return;
        if (!monthMap[m]) monthMap[m] = {};
        (n.tags || []).forEach(t => { if (topTags.includes(t)) monthMap[m][t] = (monthMap[m][t]||0)+1; });
    });

    const months = Object.keys(monthMap).sort().slice(-24);
    if (months.length < 2) return;

    document.getElementById('tl-tags-section').style.display = '';
    const svg = document.getElementById('tl-tags-chart');
    const W = 500, H = 100, PAD = { t:5, r:8, b:20, l:5 };
    const n = months.length;
    const xStep = (W - PAD.l - PAD.r) / Math.max(n - 1, 1);

    // 堆叠：计算每月各 tag 的累积值
    let s = '';
    const prevY = new Array(n).fill(H - PAD.b);

    topTags.forEach((tag, ti) => {
        const heights = months.map(m => (monthMap[m][tag] || 0));
        const maxH = Math.max(...months.map(m => Object.values(monthMap[m]||{}).reduce((a,b)=>a+b,0)), 1);
        const scale = (H - PAD.t - PAD.b) / maxH;

        const pts_top = heights.map((h, i) => `${PAD.l + i*xStep},${prevY[i] - h*scale}`).join(' ');
        const pts_bot = heights.map((_, i) => `${PAD.l + i*xStep},${prevY[i]}`).reverse().join(' ');
        const color = TL_PALETTE[ti % TL_PALETTE.length];
        s += `<polygon points="${pts_top} ${pts_bot}" fill="${color}" opacity="0.65"><title>#${esc(tag)}</title></polygon>`;
        heights.forEach((h, i) => { prevY[i] -= h * scale; });
    });

    // X 轴标签
    months.forEach((m, i) => {
        if (i % 6 === 0 || i === n-1) {
            s += `<text x="${PAD.l + i*xStep}" y="${H-5}" font-size="9" fill="var(--text-muted,#6c7086)" text-anchor="middle">${esc(m)}</text>`;
        }
    });
    svg.innerHTML = s;

    // 图例
    const legend = document.getElementById('tl-tags-legend');
    legend.innerHTML = topTags.map((t, i) =>
        `<span style="display:inline-flex;align-items:center;gap:4px;">
            <span style="width:10px;height:10px;background:${TL_PALETTE[i%TL_PALETTE.length]};border-radius:2px;opacity:0.8;flex-shrink:0;"></span>
            #${esc(t)}
         </span>`
    ).join('');
}
</script>
{% endblock %}
